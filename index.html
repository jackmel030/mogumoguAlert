<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="菇菇計時">
  <meta name="theme-color" content="#2d5a1b">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>菇菇計時器</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
  <div id="app">
    <header>
      <h1>🍄 菇菇計時器</h1>
      <p class="subtitle">Pikmin Bloom 香菇重生提醒 <span id="timer-count-badge" class="timer-count-badge"></span></p>
    </header>

    <div id="add-section">
      <button id="btn-add" class="btn-primary" onclick="openAddModal()">+ 新增計時器</button>
      <button id="btn-ocr" class="btn-ocr" onclick="openOcrModal()">📷 截圖辨識</button>
    </div>

    <div id="timer-list">
      <!-- timers rendered here -->
    </div>

    <div id="empty-state" class="hidden">
      <div class="empty-icon">🍄</div>
      <p>還沒有計時器</p>
      <p class="hint">打完菇後點「+ 新增計時器」開始追蹤</p>
    </div>

    <!-- Add Timer Modal -->
    <div id="modal-overlay" class="modal-overlay hidden" onclick="closeAddModal(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <h2>新增香菇計時器</h2>

        <div class="form-group">
          <label>蘑菇類型</label>
          <div class="mushroom-types mushroom-types-3">
            <button class="type-btn" data-type="small" onclick="selectType(this)">
              <span class="type-icon" style="font-size:20px">🍄</span>
              <span>小</span>
            </button>
            <button class="type-btn selected" data-type="normal" onclick="selectType(this)">
              <span class="type-icon" style="font-size:28px">🍄</span>
              <span>一般</span>
            </button>
            <button class="type-btn" data-type="large" onclick="selectType(this)">
              <span class="type-icon" style="font-size:38px">🍄</span>
              <span>巨大</span>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label>備註名稱（選填）</label>
          <input type="text" id="input-name" placeholder="例：公司門口、捷運站旁" maxlength="20">
        </div>

        <div class="form-group">
          <label>倒數時間</label>
          <div class="time-options">
            <button class="time-btn selected" data-minutes="5" onclick="selectTime(this)">5 分鐘</button>
            <button class="time-btn" data-minutes="10" onclick="selectTime(this)">10 分鐘</button>
            <button class="time-btn" data-minutes="15" onclick="selectTime(this)">15 分鐘</button>
            <button class="time-btn" data-minutes="0" onclick="selectTime(this)">自訂</button>
          </div>
          <div id="custom-time" class="hidden">
            <div class="custom-time-inputs">
              <input type="number" id="input-custom-minutes" placeholder="分" min="0" max="1440">
              <span class="time-separator">:</span>
              <input type="number" id="input-custom-seconds" placeholder="秒" min="0" max="59">
            </div>
          </div>
        </div>

        <div class="modal-actions">
          <button class="btn-cancel" onclick="closeAddModal()">取消</button>
          <button class="btn-confirm" onclick="addTimer()">開始計時</button>
        </div>
      </div>
    </div>
    <!-- OCR Modal -->
    <div id="ocr-overlay" class="modal-overlay hidden" onclick="closeOcrModal(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <h2>📷 截圖辨識倒數時間</h2>

        <div class="form-group">
          <label>上傳遊戲截圖</label>
          <div class="ocr-upload-area" id="ocr-drop-zone" onclick="document.getElementById('ocr-file-input').click()">
            <input type="file" id="ocr-file-input" accept="image/*" style="display:none" onchange="handleOcrFile(event)">
            <div id="ocr-preview-area">
              <div class="upload-placeholder">
                <span style="font-size:36px">📸</span>
                <p>點擊上傳或貼上截圖</p>
                <p class="hint">支援直接 Ctrl+V / Cmd+V 貼上</p>
              </div>
            </div>
          </div>
        </div>

        <div id="ocr-status" class="hidden">
          <div class="ocr-progress-bar"><div class="ocr-progress-fill" id="ocr-progress-fill"></div></div>
          <p id="ocr-status-text">辨識中...</p>
        </div>

        <div class="modal-actions">
          <button class="btn-cancel" onclick="closeOcrModal()">取消</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
